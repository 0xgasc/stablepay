<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="title">Sign Up - StablePay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Space Grotesk', sans-serif;
        }
        body {
            background: #FFFFFF;
            font-family: 'Space Grotesk', sans-serif;
        }
        body.night-mode {
            background: #1a1a1a;
            color: #fff;
        }
        body.night-mode .bg-white {
            background: #000 !important;
        }
        body.night-mode .text-black {
            color: #fff !important;
        }

        body.night-mode header .text-black,
        body.night-mode nav .text-black,
        body.night-mode header a,
        body.night-mode nav a,
        body.night-mode header span,
        body.night-mode nav span {
            color: #fff !important;
        }
        body.night-mode select,
        body.night-mode option {
            background: #000 !important;
            color: #fff !important;
            border-color: #fff !important;
        }
        body.night-mode .text-gray-700 {
            color: #ccc !important;
        }
        body.night-mode .text-gray-400 {
            color: #999 !important;
        }
        body.night-mode .text-gray-500 {
            color: #888 !important;
        }
        body.night-mode .brutal-border,
        body.night-mode .border-black {
            border-color: #fff !important;
        }
        body.night-mode .border-gray-300 {
            border-color: #666 !important;
        }
        body.night-mode [style*="box-shadow"][style*="#000"] {
            box-shadow: 8px 8px 0px #fff !important;
        }
        body.night-mode .shadow-brutal {
            box-shadow: 8px 8px 0px #fff !important;
        }
        .brutal-border {
            border: 4px solid #000;
        }
        .shadow-brutal {
            box-shadow: 8px 8px 0px #000;
        }
        .btn-brutal {
            border: 4px solid #000;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.05em;
            transition: all 0.2s;
        }
        .btn-brutal:hover {
            transform: translate(4px, 4px);
            box-shadow: 4px 4px 0px #000;
        }
        body.night-mode .btn-brutal {
            border-color: #fff;
        }
        body.night-mode .btn-brutal:hover {
            box-shadow: 4px 4px 0px #fff;
        }
        input, select {
            border: 4px solid #000;
            border-radius: 0;
        }
        body.night-mode input,
        body.night-mode select {
            border-color: #fff;
            background: #000;
            color: #fff;
        }
        body.night-mode input::placeholder {
            color: #666;
        }
        body.night-mode .border-t-4 {
            border-color: #fff !important;
        }
        body.night-mode a {
            color: #fff !important;
        }
        body.night-mode a:hover {
            color: #ccc !important;
        }
        body.night-mode nav {
            background: #000 !important;
        }
    </style>
</head>
<body class="min-h-screen">
    <!-- Navigation -->
    <nav class="bg-white border-b-4 border-black brutal-border">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <a href="/" class="text-3xl font-bold tracking-tight text-black" style="text-transform: uppercase;">
                    STABLEPAY
                </a>
                <div class="flex items-center gap-4">
                    <!-- Language Selector -->
                    <select id="languageSelector" class="px-3 py-2 bg-white text-black font-bold text-sm">
                        <option value="en">EN</option>
                        <option value="es">ES</option>
                        <option value="fr">FR</option>
                        <option value="pt">PT</option>
                    </select>
                    <!-- Night Mode Toggle -->
                    <button id="nightModeToggle" class="px-4 py-2 bg-white text-black font-bold text-sm btn-brutal">
                        <span class="night-icon" data-i18n="nav.night">NIGHT</span>
                    </button>
                    <a href="/login.html" class="text-black hover:text-gray-700 text-sm font-bold tracking-wide transition-colors" style="text-transform: uppercase;" data-i18n="nav.signIn">
                        SIGN IN
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-md mx-auto px-4 py-20">
        <div class="text-center mb-12">
            <h1 class="text-4xl font-bold text-black mb-3 tracking-tight" style="text-transform: uppercase;" data-i18n="heading">CREATE ACCOUNT</h1>
            <p class="text-gray-700" data-i18n="subheading">Enterprise payment infrastructure in 30 seconds</p>
        </div>

        <div class="bg-white border-4 border-black p-8 shadow-brutal">
            <form id="signupForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-bold text-black mb-2 tracking-wide" style="text-transform: uppercase;" data-i18n="form.companyName">COMPANY NAME</label>
                    <input type="text" id="companyName" required class="w-full px-4 py-3 bg-white border-4 border-black text-black focus:outline-none" data-i18n-placeholder="form.companyPlaceholder" placeholder="Acme Corp">
                </div>

                <div>
                    <label class="block text-sm font-bold text-black mb-2 tracking-wide" style="text-transform: uppercase;" data-i18n="form.yourName">YOUR NAME</label>
                    <input type="text" id="contactName" required class="w-full px-4 py-3 bg-white border-4 border-black text-black focus:outline-none" data-i18n-placeholder="form.namePlaceholder" placeholder="John Doe">
                </div>

                <div>
                    <label class="block text-sm font-bold text-black mb-2 tracking-wide" style="text-transform: uppercase;" data-i18n="form.email">EMAIL</label>
                    <input type="email" id="email" required class="w-full px-4 py-3 bg-white border-4 border-black text-black focus:outline-none" data-i18n-placeholder="form.emailPlaceholder" placeholder="john@acme.com">
                </div>

                <div>
                    <label class="block text-sm font-bold text-black mb-2 tracking-wide" style="text-transform: uppercase;">PASSWORD</label>
                    <div class="relative">
                        <input type="password" id="password" required minlength="8" class="w-full px-4 py-3 bg-white border-4 border-black text-black focus:outline-none pr-16" placeholder="e.g. MyPass123!">
                        <button type="button" id="togglePassword" class="absolute right-3 top-1/2 -translate-y-1/2 text-xs font-bold text-gray-500 hover:text-black" style="text-transform: uppercase;">SHOW</button>
                    </div>
                    <p class="text-xs text-gray-500 mt-1">8+ characters, uppercase, lowercase, number, special char (!@#$...)</p>
                </div>

                <label class="flex items-start cursor-pointer">
                    <input type="checkbox" required class="mt-1 mr-3 border-4 border-black">
                    <span class="text-sm text-gray-700">I agree to the <a href="/terms.html" target="_blank" class="font-bold underline" style="color: #4FC3F7;">Terms of Service</a> and <a href="/privacy.html" target="_blank" class="font-bold underline" style="color: #4FC3F7;">Privacy Policy</a></span>
                </label>

                <button type="submit" id="submitBtn" class="w-full bg-white text-black py-4 font-bold text-base tracking-wide btn-brutal" style="background: #4FC3F7; text-transform: uppercase;" data-i18n="form.createBtn">
                    CREATE ACCOUNT
                </button>

                <p class="text-center text-sm text-gray-700">
                    <span data-i18n="footer.hasAccount">Already have an account?</span>
                    <a href="/login.html" class="font-bold tracking-wide" style="color: #4FC3F7; text-transform: uppercase; text-decoration: underline;" data-i18n="footer.signInLink">
                        SIGN IN
                    </a>
                </p>
            </form>
        </div>
    </div>

    <!-- Verification Code Modal -->
    <div id="verifyModal" class="hidden fixed inset-0 bg-black bg-opacity-90 flex items-center justify-center z-50">
        <div class="bg-white border-4 border-black p-10 max-w-md w-full mx-4 shadow-brutal">
            <div class="text-center">
                <div class="w-16 h-16 bg-white border-4 border-black flex items-center justify-center mx-auto mb-6" style="background: #00E5FF;">
                    <svg class="w-8 h-8 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3">
                        <path stroke-linecap="square" stroke-linejoin="miter" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                    </svg>
                </div>
                <h2 class="text-2xl font-bold text-black mb-3 tracking-tight" style="text-transform: uppercase;">VERIFY YOUR EMAIL</h2>
                <p class="text-gray-700 mb-2">We sent a 6-digit code to</p>
                <p class="text-black font-bold mb-8" id="verifyEmailDisplay"></p>

                <!-- 6-digit code input -->
                <div class="flex justify-center gap-2 mb-6">
                    <input type="text" maxlength="1" class="w-12 h-14 text-center text-2xl font-bold text-black bg-white border-4 border-black focus:outline-none" data-code-input="0" inputmode="numeric" autocomplete="one-time-code">
                    <input type="text" maxlength="1" class="w-12 h-14 text-center text-2xl font-bold text-black bg-white border-4 border-black focus:outline-none" data-code-input="1" inputmode="numeric">
                    <input type="text" maxlength="1" class="w-12 h-14 text-center text-2xl font-bold text-black bg-white border-4 border-black focus:outline-none" data-code-input="2" inputmode="numeric">
                    <input type="text" maxlength="1" class="w-12 h-14 text-center text-2xl font-bold text-black bg-white border-4 border-black focus:outline-none" data-code-input="3" inputmode="numeric">
                    <input type="text" maxlength="1" class="w-12 h-14 text-center text-2xl font-bold text-black bg-white border-4 border-black focus:outline-none" data-code-input="4" inputmode="numeric">
                    <input type="text" maxlength="1" class="w-12 h-14 text-center text-2xl font-bold text-black bg-white border-4 border-black focus:outline-none" data-code-input="5" inputmode="numeric">
                </div>

                <p id="verifyError" class="text-red-600 font-bold text-sm mb-4 hidden"></p>

                <button id="verifyBtn" class="w-full bg-white text-black py-4 font-bold tracking-wide btn-brutal mb-4" style="background: #4FC3F7; text-transform: uppercase;">
                    VERIFY
                </button>

                <p class="text-sm text-gray-500">
                    Didn't receive the code?
                    <button id="resendBtn" class="font-bold text-black underline" style="text-transform: uppercase;">RESEND</button>
                </p>
                <p id="resendMsg" class="text-sm text-green-600 font-bold mt-2 hidden">New code sent!</p>
            </div>
        </div>
    </div>

    <script>
        // i18n functionality
        let currentLang = localStorage.getItem('preferredLanguage') || 'en';
        let translations = {};

        async function loadTranslations(lang) {
            try {
                const response = await fetch(`./locales/signup-${lang}.json`);
                translations = await response.json();
                applyTranslations();
            } catch (error) {
                console.error('Failed to load translations:', error);
            }
        }

        function applyTranslations() {
            document.querySelectorAll('[data-i18n]').forEach(element => {
                const key = element.getAttribute('data-i18n');
                const keys = key.split('.');
                let value = translations;

                for (const k of keys) {
                    value = value[k];
                    if (!value) break;
                }

                if (value) {
                    if (element.tagName === 'INPUT' || element.tagName === 'TEXTAREA') {
                        element.placeholder = value;
                    } else if (element.tagName === 'TITLE') {
                        document.title = value;
                    } else {
                        element.textContent = value;
                    }
                }
            });

            // Handle placeholders separately
            document.querySelectorAll('[data-i18n-placeholder]').forEach(element => {
                const key = element.getAttribute('data-i18n-placeholder');
                const keys = key.split('.');
                let value = translations;

                for (const k of keys) {
                    value = value[k];
                    if (!value) break;
                }

                if (value) {
                    element.placeholder = value;
                }
            });
        }

        // Language selector
        document.getElementById('languageSelector').addEventListener('change', (e) => {
            currentLang = e.target.value;
            localStorage.setItem('preferredLanguage', currentLang);
            loadTranslations(currentLang);
        });

        // Set initial language
        document.getElementById('languageSelector').value = currentLang;
        loadTranslations(currentLang);

        // Night mode toggle
        const nightModeToggle = document.getElementById('nightModeToggle');
        const nightIcon = document.querySelector('.night-icon');

        // Check for saved night mode preference
        if (localStorage.getItem('nightMode') === 'true') {
            document.body.classList.add('night-mode');
            const currentLang = localStorage.getItem('language') || 'en';
            fetch(`/locales/${currentLang}.json`)
                .then(res => res.json())
                .then(translations => {
                    nightIcon.textContent = translations.nav.day;
                    nightIcon.setAttribute('data-i18n', 'nav.day');
                });
        }

        nightModeToggle.addEventListener('click', () => {
            document.body.classList.toggle('night-mode');
            const isNightMode = document.body.classList.contains('night-mode');
            localStorage.setItem('nightMode', isNightMode);

            // Update translation
            const currentLang = localStorage.getItem('language') || 'en';
            fetch(`/locales/${currentLang}.json`)
                .then(res => res.json())
                .then(translations => {
                    nightIcon.textContent = isNightMode ? translations.nav.day : translations.nav.night;
                    nightIcon.setAttribute('data-i18n', isNightMode ? 'nav.day' : 'nav.night');
                });
        });

        // Password toggle
        document.getElementById('togglePassword').addEventListener('click', () => {
            const pw = document.getElementById('password');
            const btn = document.getElementById('togglePassword');
            if (pw.type === 'password') { pw.type = 'text'; btn.textContent = 'HIDE'; }
            else { pw.type = 'password'; btn.textContent = 'SHOW'; }
        });

        // Store signup email for verification
        let signupEmail = '';
        let signupMerchantId = '';

        // Inline error display
        function showSignupError(msg) {
            let errEl = document.getElementById('signupError');
            if (!errEl) {
                errEl = document.createElement('p');
                errEl.id = 'signupError';
                errEl.className = 'text-sm font-bold text-red-600 mt-2';
                document.getElementById('submitBtn').parentNode.insertBefore(errEl, document.getElementById('submitBtn'));
            }
            errEl.textContent = msg;
            errEl.classList.remove('hidden');
        }
        function hideSignupError() {
            const errEl = document.getElementById('signupError');
            if (errEl) errEl.classList.add('hidden');
        }

        // Signup form submission
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideSignupError();
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'CREATING ACCOUNT...';

            signupEmail = document.getElementById('email').value;

            try {
                const response = await fetch(window.location.origin + '/api/v1/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: signupEmail,
                        companyName: document.getElementById('companyName').value,
                        contactName: document.getElementById('contactName').value,
                        password: document.getElementById('password').value,
                        plan: 'FREE'
                    })
                });

                const result = await response.json();

                if (response.ok) {
                    signupMerchantId = result.merchantId;
                    document.getElementById('verifyEmailDisplay').textContent = signupEmail;
                    document.getElementById('verifyModal').classList.remove('hidden');
                    document.querySelector('[data-code-input="0"]').focus();
                } else {
                    showSignupError(result.message || result.error || 'Failed to create account');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'CREATE ACCOUNT';
                }
            } catch (error) {
                showSignupError('Connection failed. Please try again.');
                submitBtn.disabled = false;
                submitBtn.textContent = 'CREATE ACCOUNT';
            }
        });

        // ─── Verification code input handling ───────────────────────────
        const codeInputs = document.querySelectorAll('[data-code-input]');

        codeInputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                const val = e.target.value.replace(/\D/g, '');
                e.target.value = val.slice(0, 1);
                if (val && index < 5) {
                    codeInputs[index + 1].focus();
                }
                // Auto-submit when all 6 digits entered
                if (index === 5 && val) {
                    const code = Array.from(codeInputs).map(i => i.value).join('');
                    if (code.length === 6) submitVerification(code);
                }
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    codeInputs[index - 1].focus();
                }
            });
            // Handle paste
            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const pasted = (e.clipboardData.getData('text') || '').replace(/\D/g, '').slice(0, 6);
                pasted.split('').forEach((char, i) => {
                    if (codeInputs[i]) codeInputs[i].value = char;
                });
                if (pasted.length === 6) submitVerification(pasted);
                else if (codeInputs[pasted.length]) codeInputs[pasted.length].focus();
            });
        });

        // Verify button
        document.getElementById('verifyBtn').addEventListener('click', () => {
            const code = Array.from(codeInputs).map(i => i.value).join('');
            if (code.length === 6) submitVerification(code);
        });

        async function submitVerification(code) {
            const verifyBtn = document.getElementById('verifyBtn');
            const errorEl = document.getElementById('verifyError');
            verifyBtn.disabled = true;
            verifyBtn.textContent = 'VERIFYING...';
            errorEl.classList.add('hidden');

            try {
                const response = await fetch(window.location.origin + '/api/verify-email', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: signupEmail, code })
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    // Auto-login: store credentials and redirect to dashboard
                    sessionStorage.setItem('merchantToken', result.token);
                    sessionStorage.setItem('merchantId', result.merchantId);
                    sessionStorage.setItem('isAuthenticated', 'true');
                    sessionStorage.setItem('isActive', result.isActive);
                    window.location.href = '/dashboard.html';
                } else {
                    errorEl.textContent = result.error || 'Invalid code';
                    errorEl.classList.remove('hidden');
                    codeInputs.forEach(i => i.value = '');
                    codeInputs[0].focus();
                }
            } catch (error) {
                errorEl.textContent = 'Verification failed. Please try again.';
                errorEl.classList.remove('hidden');
            } finally {
                verifyBtn.disabled = false;
                verifyBtn.textContent = 'VERIFY';
            }
        }

        // Resend verification code (60s cooldown)
        let resendCooldown = false;
        document.getElementById('resendBtn').addEventListener('click', async () => {
            if (resendCooldown) return;
            const resendBtn = document.getElementById('resendBtn');
            const resendMsg = document.getElementById('resendMsg');
            resendBtn.disabled = true;
            resendCooldown = true;

            try {
                const res = await fetch(window.location.origin + '/api/resend-verification', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: signupEmail })
                });
                if (res.status === 429) {
                    resendMsg.textContent = 'Too many requests. Wait a minute.';
                    resendMsg.style.color = '#dc2626';
                } else {
                    resendMsg.textContent = 'New code sent!';
                    resendMsg.style.color = '#16a34a';
                }
                resendMsg.classList.remove('hidden');
            } catch (error) {
                resendMsg.textContent = 'Failed to resend. Try again later.';
                resendMsg.style.color = '#dc2626';
                resendMsg.classList.remove('hidden');
            }

            // 60s cooldown
            let secs = 60;
            resendBtn.textContent = `RESEND (${secs}s)`;
            const timer = setInterval(() => {
                secs--;
                resendBtn.textContent = `RESEND (${secs}s)`;
                if (secs <= 0) {
                    clearInterval(timer);
                    resendBtn.disabled = false;
                    resendBtn.textContent = 'RESEND';
                    resendCooldown = false;
                }
            }, 1000);
        });
    </script>
</body>
</html>
